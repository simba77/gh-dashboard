name: Release

on:
  push:
    tags:
      - 'v*'

# tauri-action creates the draft release via the GitHub API; default
# GITHUB_TOKEN is read-only and would 403 on POST /repos/.../releases.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal (arm64 + x86_64) build on the Apple Silicon runner.
          # GitHub retired the Intel `macos-13` image, so x86_64 is produced by
          # cross-compiling here rather than on a dedicated Intel runner.
          - platform: macos
            os: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-x64
            os: windows-latest
            args: ''
          - platform: linux-x64
            os: ubuntu-22.04 # старше = совместимее по glibc
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux deps for Tauri
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DevPulse ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
